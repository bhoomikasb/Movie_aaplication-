<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

/* Background */

body{
    background: radial-gradient(circle at top,#1a0000,#000000);
    color:white;
}

/* NAVBAR */

.nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
    height:75px;

    background: rgba(255,0,0,0.05);
    backdrop-filter: blur(10px);

    border-bottom:1px solid rgba(255,0,0,0.3);
}

/* Logo */

.left h2{
    color:#ff2e2e;
    letter-spacing:2px;
    font-weight:600;
}

/* Links */

.right{
    display:flex;
    gap:30px;
}

.right a{
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.right a:hover{
    color:#ff2e2e;
    text-shadow:0 0 10px #ff2e2e;
}

/* HERO SECTION */

.hero-section{

    margin:40px auto;
    width:90%;
    height:320px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:20px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);

    border:1px solid rgba(255,0,0,0.2);
}

/* Hero text */

.content{
    text-align:center;
}

.content h1{
    margin:10px 0;
}

/* Button */

.content button{

    margin-top:20px;

    padding:10px 25px;

    border:none;
    border-radius:30px;

    background:#ff2e2e;
    color:white;

    font-weight:600;
    cursor:pointer;

    transition:0.3s;
}

.content button:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 10px #ff2e2e,
    0 0 20px #ff2e2e;

}

/* Latest Movies Title */

.latest{

    text-align:center;
    margin-top:20px;
    font-size:28px;

    color:#ff2e2e;

    letter-spacing:2px;
}

/* Movie Section */

.movie{

    display:flex;
    justify-content:center;
    gap:40px;

    margin:40px;
}

/* Movie Posters */

.movie img{

    height:300px;
    width:220px;

    border-radius:15px;

    object-fit:cover;

    transition:0.4s;

    box-shadow:
    0 10px 25px rgba(0,0,0,0.8);
}

/* Hover effect */

.movie img:hover{

    transform: translateY(-12px) scale(1.05);

    box-shadow:
    0 20px 40px rgba(0,0,0,0.9),
    0 0 20px rgba(255,0,0,0.6);

}

</style>
</head>
<body>
    <div class="nav">
        <div class="left">
            <h2>Pmax</h2>
        </div>
        <div class="right">
            <a href="{% url 'signup' %}">signup</a>
            <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
    <div class="hero-section">
        <div class="content">
            <h1><i class="fa-solid fa-film"></i> Welcome to Pmax</h1> <br> <br>
            <h2><i class="fa-solid fa-clapperboard"></i> Browse Latest Movies</h2><br> <br>
            <button>Browse</button>
        </div>
    </div>
    <h1 class="latest">Latest Movies</h1>
    <div class="movie">
        <img src="https://knowlepedia.org/images/4/4b/Dhurandhar_Poster.jpg" alt="">
        <img src="https://m.media-amazon.com/images/I/71dW1NWGJSL._AC_UF1000,1000_QL80_.jpg" alt="">
        <img src="https://play-lh.googleusercontent.com/7zUU4b73KFZkbjMS8l9Ypwlw3MabdG89yywhSyaxgKDtkvEq9vvK3_ShyS7iBAGKLZ7wq6gzKJPRZrRWiA" alt="">
    </div>
    <div class="movie">
        <img src="https://knowlepedia.org/images/4/4b/Dhurandhar_Poster.jpg" alt="">
        <img src="https://m.media-amazon.com/images/I/71dW1NWGJSL._AC_UF1000,1000_QL80_.jpg" alt="">
        <img src="https://play-lh.googleusercontent.com/7zUU4b73KFZkbjMS8l9Ypwlw3MabdG89yywhSyaxgKDtkvEq9vvK3_ShyS7iBAGKLZ7wq6gzKJPRZrRWiA" alt="">
    </div>
</body>
</html>
